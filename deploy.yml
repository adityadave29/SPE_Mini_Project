- name: Deploy Calculator Container
  hosts: local
  become: false

  tasks:

    - name: Stop old container
      shell: /usr/local/bin/docker stop calculator-container || true

    - name: Remove old container
      shell: /usr/local/bin/docker rm calculator-container || true

    - name: Pull latest image
      shell: /usr/local/bin/docker pull adityadave29/calculator:latest

    - name: Run new container
      shell: /usr/local/bin/docker run -d --name calculator-container adityadave29/calculator:latest