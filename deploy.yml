- name: Deploy Calculator Container
  hosts: local
  become: false

  tasks:

    - name: Stop old container
      shell: /opt/homebrew/bin/docker stop calculator || true

    - name: Remove old container
      shell: /opt/homebrew/bin/docker rm calculator || true

    - name: Pull latest image
      shell: /opt/homebrew/bin/docker pull adityadave29/calculator:latest